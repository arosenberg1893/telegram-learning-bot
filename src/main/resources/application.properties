# ??? Telegram Bot ????????????????????????????????????????????????????????????
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}

# ??? VK Bot ?????????????????????????????????????????????????????????????????
vk.bot.enabled=${VK_BOT_ENABLED:}
vk.bot.token=${VK_BOT_TOKEN:}
vk.bot.group-id=${VK_BOT_GROUP_ID:}

# ??? Database ????????????????????????????????????????????????????????????????
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
logging.level.org.flywaydb=DEBUG
spring.flyway.locations=classpath:db/migration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ??? Rate limiting ????????????????????????????????????????????????????????????
rate.limit.max-requests-per-minute=${RATE_LIMIT_MAX:30}

# ??? Message limits ???????????????????????????????????????????????????????????
message.max-length=${MESSAGE_MAX_LENGTH:2000}

# ??? Logging ?????????????????????????????????????????????????????????????????
logging.level.com.lbt=INFO

# ─── Admin user (Telegram ID) ───
admin.user-id=${ADMIN_TELEGRAM_ID:}

# VK bot page size (to avoid keyboard row limits)
vk.bot.page-size=${VK_BOT_PAGE_SIZE:3}

# Yandex.Disk
yandex.disk.token=${YANDEX_DISK_TOKEN:}

# Google Drive (?????????)
google.drive.client.id=${GOOGLE_DRIVE_CLIENTID:}
google.drive.client.secret=${GOOGLE_DRIVE_SECRETID:}
google.drive.refresh.token=${GOOGLE_DRIVE_REFRESH_TOKEN}